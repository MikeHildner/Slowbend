<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Slowbend master icon.
    A wave that starts fast and stretches out slower - time-stretching, drawn.
    Reused as: favicon (this file), in-app logo (src/components/Logo.tsx shares
    the same path), and later as the export master for Android/iOS app icons.
    The wave spans the center ~61% of the canvas, inside the ~66% safe zone that
    Android adaptive icons and iOS masking require, so it can be exported
    full-bleed (set the background rx to 0 and rasterize at 1024, 512, 192...).
  -->
  <defs>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb45e"/>
      <stop offset="1" stop-color="#f08a24"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="#16161c"/>
